name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Secret scan
        run: ./scripts/secret-scan.sh

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Retrieval benchmark gate
        run: npm run bench:retrieval:gate

      - name: Build
        run: npm run build

      - name: Cargo test
        run: cargo test --workspace

      - name: Ops quality runtime pack
        run: npm run ops:quality-runtime-pack:json
